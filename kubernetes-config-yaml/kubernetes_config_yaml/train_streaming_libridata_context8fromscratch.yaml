apiVersion: v1
kind: Pod
metadata:
  name: nde-icefall-train-50-context8scratch-on-libridata
  labels:
    user: nde
    project: polaris
  namespace: am-team
spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: accelerator
            operator: NotIn
            values:
            - a100
  restartPolicy: Never
  imagePullSecrets:
    - name: docker-melodis-readonly
  containers:
    - name: nde-icefall-container-train-50-context8scratch-on-libridata
      # image: docker.melodis.com/soundhound/zipformer_with_slurp_streaming:v17
      image: docker.melodis.com/soundhound/icefall:torch1.13.0-cuda11.6-updated-v3
      command:
        - "egs/librispeech/ASR/zipformer/train.py"
        - "--num-epochs"
        - "50"
        - "--context-size" #####
        - "8"
        - "--use-fp16"
        - "1"
        - "--start-epoch" ####
        - "1"
        - "--causal"
        - "1"
        - "--full-libri"
        - "1"
        - "--max-duration"
        - "1000"
        - "--exp-dir"
        - "zipformer/exp-causal-context8"
        - "--base-lr"
        - "0.04"
      imagePullPolicy: Always
      tty: true
      env:
        - name: USER
          value: nde
      resources:
        requests:
          cpu: 26
          nvidia.com/gpu: 4
          memory: 40Gi
          ephemeral-storage: 40Gi
        limits:
          cpu: 26
          nvidia.com/gpu: 4
          memory: 40Gi
      volumeMounts:
        - name: nde-icefall-volume
          mountPath: /workspace/icefall/download #using absolutepath here
          subPath: download #in the volume /whatever/download, using relative path here
        - name: nde-icefall-volume
          mountPath: /workspace/icefall/data
          subPath: data
        - name: nfs-workspace-rw
          mountPath: /workspace/icefall/zipformer/exp-causal-context8 #│ INFO [checkpoint.py:75] Saving checkpoint to zipformer/exp-causal/epoch-40.pt                                                        
          subPath: models_streaming/zipformer/v402_streaming_context8 #in the volume /whatever/models/zipformer/v0, saving the trained model from /workspace/icefall/egs/librispeech/ASR/zipformer/exp in pod while training to here
          readOnly: false
        - name: dshm
          mountPath: /dev/shm
  tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule
  volumes:
    - name: nde-icefall-volume
      persistentVolumeClaim:
        claimName: nde-icefall-claim
    - name: nfs-workspace-rw
      nfs:
        server: gpu.fss.us-phoenix-1.development.oci.soundhound.private
        path: /dev_gpu_filesystem/am-team/workspaces/nde
        readOnly: false
    - name: dshm
      emptyDir:
        medium: Memory
